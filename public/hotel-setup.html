<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Importar Setup de Hotel</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #161a21;
    --border: #262c36;
    --text: #e6e8eb;
    --muted: #8b93a1;
    --accent: #4f8cff;
    --accent-hover: #6ea0ff;
    --ok: #3ecf8e;
    --err: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.subtitle { color: var(--muted); margin: 0 0 24px; font-size: 14px; }

  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(79, 140, 255, 0.08);
  }
  .dropzone .filename {
    margin-top: 10px;
    font-size: 13px;
    color: var(--accent);
    word-break: break-all;
  }
  input[type="file"] { display: none; }

  .fields { display: grid; gap: 12px; margin-top: 20px; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #10131a;
    color: var(--text);
    font-size: 14px;
  }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }

  button.import-btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.import-btn:hover { background: var(--accent-hover); }
  button.import-btn:disabled { background: #33394a; cursor: not-allowed; }

  .result {
    margin-top: 20px;
    padding: 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    white-space: pre-wrap;
  }
  .result.ok { display: block; background: rgba(62, 207, 142, 0.1); border: 1px solid var(--ok); color: var(--ok); }
  .result.err { display: block; background: rgba(255, 92, 92, 0.1); border: 1px solid var(--err); color: var(--err); }
</style>
</head>
<body>

<div class="card">
  <h1>Importar Setup de Hotel</h1>
  <p class="subtitle">Sube el JSON que envía el equipo de WordPress para crear el hotel automáticamente en todas las colecciones.</p>

  <div class="dropzone" id="dropzone">
    <div id="dropzoneLabel">📄 Arrastra el archivo <b>.json</b> aquí o haz clic para elegirlo</div>
    <div class="filename" id="filename"></div>
    <input type="file" id="fileInput" accept="application/json,.json" />
  </div>

  <div class="fields">
    <div>
      <label for="apiUrl">URL del endpoint</label>
      <input type="text" id="apiUrl" value="http://localhost:3000/hotel-setup/import-file" />
    </div>
    <div>
      <label for="hotelSlugOverride">Slug del hotel (opcional, si quieres forzarlo)</label>
      <input type="text" id="hotelSlugOverride" placeholder="ej. mi-gran-hotel" />
    </div>
    <div>
      <label for="adminPassword">Password admin (opcional, default 12345)</label>
      <input type="text" id="adminPassword" placeholder="12345" />
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="upsert" checked />
      <label for="upsert" style="margin:0;">Actualizar si el hotel ya existe (upsert)</label>
    </div>
  </div>

  <button class="import-btn" id="importBtn" disabled>Importar Hotel</button>

  <div class="result" id="result"></div>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const filenameEl = document.getElementById('filename');
  const importBtn = document.getElementById('importBtn');
  const resultEl = document.getElementById('result');

  let selectedFile = null;

  dropzone.addEventListener('click', () => fileInput.click());

  ['dragenter', 'dragover'].forEach((evt) =>
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    })
  );
  ['dragleave', 'drop'].forEach((evt) =>
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
    })
  );
  dropzone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) setFile(file);
  });

  function setFile(file) {
    if (!file.name.endsWith('.json')) {
      showResult(false, 'El archivo debe ser un .json');
      return;
    }
    selectedFile = file;
    filenameEl.textContent = '✔ ' + file.name;
    importBtn.disabled = false;
  }

  function showResult(ok, message) {
    resultEl.className = 'result ' + (ok ? 'ok' : 'err');
    resultEl.textContent = message;
  }

  importBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    importBtn.disabled = true;
    importBtn.textContent = 'Importando...';
    resultEl.className = 'result';

    const apiUrl = document.getElementById('apiUrl').value.trim();
    const hotelSlugOverride = document.getElementById('hotelSlugOverride').value.trim();
    const adminPassword = document.getElementById('adminPassword').value.trim();
    const upsert = document.getElementById('upsert').checked;

    const params = new URLSearchParams();
    if (hotelSlugOverride) params.set('hotelSlugOverride', hotelSlugOverride);
    if (adminPassword) params.set('adminPassword', adminPassword);
    params.set('upsert', String(upsert));

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch(`${apiUrl}?${params.toString()}`, {
        method: 'POST',
        body: formData,
      });
      const data = await res.json();

      if (!res.ok) {
        showResult(false, '❌ Error:\n' + JSON.stringify(data, null, 2));
      } else {
        showResult(true, '✅ ' + data.message + '\n\n' + JSON.stringify(data.summary, null, 2));
      }
    } catch (err) {
      showResult(false, '❌ No se pudo conectar al endpoint:\n' + err.message);
    } finally {
      importBtn.disabled = false;
      importBtn.textContent = 'Importar Hotel';
    }
  });
</script>

</body>
</html>
